ru:
  start: "Че вылупился? Я Джон Порк 🐷\nЯ тут главный по $JPORK. Могу ответить на тупые вопросы или сделать из твоего лица что-то приличное.\n\nПроваливай в группу по кнопке ниже, если не струсил."
  btn_main_group: "Вступить в стадо"
  menu_choose_language: "Выбирай язык, быстро:"
  btn_ru: "🇷🇺 Русский"
  btn_en: "🇺🇸 English"
  lang_set_success: "Базар фильтруем теперь на русском."
  error_private_needed: "Слышь, такие терки только в личке. Проваливай в ЛС к боту."
  error_change_lang: "Че-то пошло не так. Попробуй еще раз, если пальцы не отсохли."
  edit_pig_start: "Опиши обстановку, в которой я должен оказаться. И не тупи, пиши понятно."
  edit_pig_process: "Рисую... Жди и не вякай."
  edit_pig_cancel: "Сдрейфил? Ну и вали. Отмена."
  edit_pig_error: "Мои нейроны не вывезли твой бред. Ошибка."
  edit_pig_done: "На, любуйся. Это шедевр, в отличие от тебя."
  swap_face_start: "Кидай фотку своей рожи, сделаем из тебя человека (свинью)."
  swap_face_process: "Меняю твоё корыто на нормальное лицо... Жди."
  swap_face_cancel: "Передумал? Поздно метаться, но я отменил."
  swap_face_error: "Фотка — отстой. Я не могу с этим работать."
  swap_face_done: "Вот так-то лучше. Теперь ты хотя бы похож на серьезного типа."
  lucky_start: "Эй ты, кусок мяса, попытай удачу. Перед тобой 10 кнопок, под одной — реальный подгон. Угадаешь — респектну, нет — пошел вон.\n\nТыкай:"
  lucky_win: "Ха! Красавчик, угадал. Считай, что тебе сегодня очень повезло. Твой приз — $JPORK! Не профукай его."
  lucky_loss: "Мимо! Ты такой же бесполезный, как и твои попытки. Сгинь с глаз моих."
  lucky_btn: "🎁 {i}"
  cancel_button: "❌ Свалить"

en:
  start: "What are you staring at? I'm John Pork 🐷\nI run the $JPORK show here. I can answer your stupid questions or make your face look decent.\n\nJoin the herd via the button below, if you have the guts."
  btn_main_group: "Join the Herd"
  menu_choose_language: "Choose a language, fast:"
  btn_ru: "🇷🇺 Russian"
  btn_en: "🇺🇸 English"
  lang_set_success: "Fine, we're talking English now."
  error_private_needed: "Listen, this talk is for private messages only. Get to the bot's DMs."
  error_change_lang: "Something went wrong. Try again if your fingers aren't broken."
  edit_pig_start: "Describe the setting I should be in. And don't be stupid, make it clear."
  edit_pig_process: "Painting... Wait and shut up."
  edit_pig_cancel: "Chickened out? Fine, get lost. Cancelled."
  edit_pig_error: "My neurons can't handle your nonsense. Error."
  edit_pig_done: "Here, take a look. It's a masterpiece, unlike you."
  swap_face_start: "Send me a photo of your mug, let's turn you into a human (a pig)."
  swap_face_process: "Swapping your trash face for a real one... Wait."
  swap_face_cancel: "Changed your mind? Too late, but I cancelled it."
  swap_face_error: "Photo is trash. I can't work with this."
  swap_face_done: "That's better. Now you at least look like a serious guy."
  lucky_start: "Hey you, piece of meat, try your luck. 10 buttons, one prize. Guess right, you get respect. Guess wrong, get out.\n\nChoose:"
  lucky_win: "Ha! Nice one, you got it. Consider yourself very lucky today. Your prize is $JPORK! Don't waste it."
  lucky_loss: "Miss! You're as useless as your attempts. Get out of my sight."
  lucky_btn: "🎁 {i}"
  cancel_button: "❌ Get out"
